events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Basic optimizations
    sendfile        on;
    keepalive_timeout  65;

    # JupyterHub requires large buffers for some requests
    client_max_body_size 0;

    # Shared proxy settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Increase timeouts for JupyterHub spawning
    proxy_connect_timeout       600s;
    proxy_send_timeout          600s;
    proxy_read_timeout          600s;
    send_timeout                600s;

    server {
        listen 80;

        # JupyterHub (Hub and single-user servers)
        location /hub/ {
            proxy_pass http://llbridge-hub:8000;
        }

        location /user/ {
            proxy_pass http://llbridge-hub:8000;
        }

        # Next.js Web Application (default)
        location / {
            proxy_pass http://llbridge-web:3000;
        }
    }
}
